<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://storage.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; img-src 'self' data: blob:;">
<title>FoxVault — Secure Document Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Figtree:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* --- CORE THEME (Keeping your Nintai Aesthetic) --- */
:root {
  --ink: #0B0F1A; --emerald: #10B981; --t1: #F0F6FF; --t2: #8BA3C7; --t3: #4B6080;
  --surface: #151C2E; --border: rgba(255,255,255,0.07); --ease: cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Figtree', sans-serif; background: var(--ink); color: var(--t1); height: 100vh; overflow: hidden; }

/* SPA VIEW CONTROL - Stops the flicker */
#view-login, #view-app { display: none; height: 100vh; width: 100vw; }
.view-active { display: flex !important; }

/* AUTH GATE */
.auth-gate { flex-direction: column; align-items: center; justify-content: center; background: var(--ink); }
.auth-card { background: #111827; padding: 40px; border-radius: 20px; border: 1px solid var(--border); width: 90%; max-width: 400px; text-align: center; }

/* APP LAYOUT */
.sidebar { width: 240px; background: #111827; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
.content { flex: 1; overflow-y: auto; padding: 28px; }

/* REUSE ALL YOUR REMAINING CSS CLASSES HERE (Stat-card, doc-row, etc.) */
.page { display: none; }
.page.active { display: block; }
</style>
</head>
<body>
<div class="bg"></div>

<div id="view-login" class="auth-gate">
  <div class="auth-card">
    <h2 style="font-family:'Syne'; margin-bottom:20px;">🔐 Fox<em>Vault</em></h2>
    <input type="email" id="loginEmail" placeholder="Vault ID" style="width:100%; padding:12px; margin-bottom:10px; background:#0B0F1A; border:1px solid var(--border); color:white; border-radius:8px;">
    <button onclick="handleAuth()" style="width:100%; padding:12px; background:var(--emerald); border:none; color:black; font-weight:bold; border-radius:8px; cursor:pointer;">ACCESS VAULT</button>
  </div>
</div>

<div id="view-app">
  <aside class="sidebar">
    <div style="padding:20px; font-weight:bold; border-bottom:1px solid var(--border)">🔐 FoxVault</div>
    <nav style="padding:10px; flex:1;">
        <div onclick="nav('dashboard')" style="padding:10px; cursor:pointer;">Dashboard</div>
        <div onclick="nav('documents')" style="padding:10px; cursor:pointer;">Documents</div>
    </nav>
    <div onclick="logout()" style="padding:20px; cursor:pointer; color:var(--t3)">Sign Out</div>
  </aside>

  <div class="main">
    <div class="topbar" style="height:60px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px;">
        <div id="pageTitle">DASHBOARD</div>
    </div>
    <div class="content">
      <div class="page active" id="pg-dashboard">
          <div id="s-total">0</div> Documents
          <div class="upload-zone" onclick="document.getElementById('fi').click()" style="border:2px dashed var(--border); padding:40px; text-align:center; margin-top:20px; cursor:pointer;">
            Drop PDF here
          </div>
          <input type="file" id="fi" style="display:none" onchange="handleFile(event)">
          <div id="recentList" style="margin-top:20px;"></div>
      </div>
      <div class="page" id="pg-documents">
          <div id="allList"></div>
      </div>
    </div>
  </div>
</div>

<script>
// --- STATE MANAGEMENT (Fixes "Not Reflecting" bug) ---
const S = { docs: [], storage: 0 };

function nav(pg) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('pg-' + pg).classList.add('active');
    document.getElementById('pageTitle').textContent = pg.toUpperCase();
}

function renderDocs() {
    const listHtml = S.docs.length ? S.docs.map(d => `<div style="padding:10px; border-bottom:1px solid var(--border)">📄 ${d.name} (${d.size} MB)</div>`).join('') : "Vault Empty";
    document.getElementById('recentList').innerHTML = listHtml;
    document.getElementById('allList').innerHTML = listHtml;
    document.getElementById('s-total').textContent = S.docs.length;
}

function handleFile(e) {
    const file = e.target.files[0];
    if(!file) return;
    
    // Logic: Update State -> Save -> Render
    const newDoc = { id: crypto.randomUUID(), name: file.name, size: (file.size/(1024*1024)).toFixed(2) };
    S.docs.unshift(newDoc);
    localStorage.setItem('fv_docs', JSON.stringify(S.docs));
    renderDocs();
}

function handleAuth() {
    localStorage.setItem('fv_token', 'active');
    showView('app');
}

function logout() {
    localStorage.clear();
    location.reload(); 
}

function showView(v) {
    document.getElementById('view-login').classList.remove('view-active');
    document.getElementById('view-app').classList.remove('view-active');
    document.getElementById('view-' + v).classList.add('view-active');
}

window.onload = () => {
    if(localStorage.getItem('fv_token')) {
        const saved = localStorage.getItem('fv_docs');
        if(saved) S.docs = JSON.parse(saved);
        showView('app');
        renderDocs();
    } else {
        showView('login');
    }
}
</script>
</body>
</html>
